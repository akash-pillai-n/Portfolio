name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Vercel deployment is handled automatically by the Vercel GitHub integration.
# This workflow only runs build validation and type checks.

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
